        function showToast(msg, isError = false) {
            toast.textContent = msg;
            toast.style.backgroundColor = isError ? '#b91c1c' : '#1e293b';
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>' : '&gt;' }[m]));
        }

        async function copyToClipboard(text, successMsg = '✅ 已复制信息') {
            if (navigator.clipboard && window.isSecureContext !== false) {
                try {
                    await navigator.clipboard.writeText(text);
                    showToast(successMsg);
                    return true;
                } catch (err) { console.warn(err); }
            }
            try {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.style.position = 'fixed';
                ta.style.opacity = '0';
                document.body.appendChild(ta);
                ta.select();
                ta.setSelectionRange(0, text.length);
                const success = document.execCommand('copy');
                document.body.removeChild(ta);
                if (success) { showToast(successMsg); return true; }
                throw new Error('execCommand failed');
            } catch (err) {
                console.error(err);
                showToast('❌ 复制失败', true);
                return false;
            }
        }

        function matchRange(value, range) {
            if (range === 'all') return true;
            const num = Number(value) || 0;
            switch(range) {
                case '0-10': return num >= 0 && num < 10;
                case '10-20': return num >= 10 && num < 20;
                case '20-30': return num >= 20 && num < 30;
                case '30-40': return num >= 30 && num < 40;
                case '40-50': return num >= 40 && num < 50;
                case '50+': return num >= 50;
                case '0-20': return num >= 0 && num < 20;
                case '20-50': return num >= 20 && num < 50;
                case '30-50': return num >= 30 && num < 50;
                case '50-80': return num >= 50 && num < 80;
                case '80-100': return num >= 80 && num < 100;
                case '100+': return num >= 100;
                case '0-100': return num >= 0 && num < 100;
                case '100-200': return num >= 100 && num < 200;
                case '200-300': return num >= 200 && num < 300;
                case '300-400': return num >= 300 && num < 400;
                case '400+': return num >= 400;
                case '0-1m': return num >= 0 && num < 1000000;
                case '1-3m': return num >= 1000000 && num < 3000000;
                case '3-6m': return num >= 3000000 && num < 6000000;
                case '6-10m': return num >= 6000000 && num < 10000000;
                case '10-20m': return num >= 10000000 && num < 20000000;
                case '20-50m': return num >= 20000000 && num < 50000000;
                case '50-100m': return num >= 50000000 && num < 100000000;
                case '100m+': return num >= 100000000;
                case '0-12': return num >= 0 && num < 12;
                case '12-30': return num >= 12 && num < 30;
                case '30-60': return num >= 30 && num < 60;
                case '0-1': return num >= 0 && num < 1;
                case '1-10': return num >= 1 && num < 10;
                case '10-20': return num >= 10 && num < 20;
                case '20-30': return num >= 20 && num < 30;
                case '30-40': return num >= 30 && num < 40;
                case '40-50': return num >= 40 && num < 50;
                case '50-100': return num >= 50 && num < 100;
                case '100-200': return num >= 100 && num < 200;
                case '200-300': return num >= 200 && num < 300;
                case '300-500': return num >= 300 && num < 500;
                case '500-1000': return num >= 500 && num < 1000;
                case '1000+': return num >= 1000;
                default: return true;
            }
        }

        function getLevelRange(level) {
            if (level === 0) return '未知';
            if (level < 10) return '0-10';
            if (level < 20) return '10-20';
            if (level < 30) return '20-30';
            if (level < 40) return '30-40';
            if (level < 50) return '40-50';
            return '50+';
        }

        function getAqtwLevelRange(level) {
            if (level === 0) return '未知';
            if (level <= 10) return '0-10';
            if (level <= 20) return '10-20';
            if (level <= 29) return '20-29';
            return '30+';
        }

        function matchLevelRangeHpjy(level, range) {
            if (range === 'all') return true;
            const lvl = Number(level) || 0;
            switch(range) {
                case '0-5': return lvl < 5;
                case '5-10': return lvl >= 5 && lvl < 10;
                case '10-30': return lvl >= 10 && lvl < 30;
                case '30-40': return lvl >= 30 && lvl < 40;
                case '40-60': return lvl >= 40 && lvl < 60;
                case '60+': return lvl >= 60;
                default: return true;
            }
        }

        function matchRank(rankText, filterRank) {
            if (filterRank === 'all') return true;
            if (filterRank === '王牌以上') {
                return /王牌|战神/i.test(rankText);
            }
            return rankText.indexOf(filterRank) !== -1;
        }

        function matchSjzTotalValueRange(value, range) {
            if (range === 'all') return true;
            const val = Number(value) || 0;
            switch(range) {
                case '0-1': return val >= 0 && val < 1;
                case '1-10': return val >= 1 && val < 10;
                case '10-20': return val >= 10 && val < 20;
                case '20-30': return val >= 20 && val < 30;
                case '30-40': return val >= 30 && val < 40;
                case '40-50': return val >= 40 && val < 50;
                case '50-100': return val >= 50 && val < 100;
                case '100-200': return val >= 100 && val < 200;
                case '200-300': return val >= 200 && val < 300;
                case '300-500': return val >= 300 && val < 500;
                case '500-1000': return val >= 500 && val < 1000;
                case '1000+': return val >= 1000;
                default: return true;
            }
        }

        function matchSkinRange(skin, range) {
            if (range === 'all') return true;
            const num = Number(skin) || 0;
            switch(range) {
                case '0-100': return num >= 0 && num < 100;
                case '100-200': return num >= 100 && num < 200;
                case '200-300': return num >= 200 && num < 300;
                case '300-400': return num >= 300 && num < 400;
                case '400-500': return num >= 400 && num < 500;
                case '500-600': return num >= 500 && num < 600;
                case '600-700': return num >= 600 && num < 700;
                case '700+': return num >= 700;
                default: return true;
            }
        }

        function getRankRange(rankText) {
            const rank = rankText;
            if (rank.includes('青铜') || rank.includes('Bronze')) return 'bronze-silver';
            if (rank.includes('白银') || rank.includes('Silver')) return 'silver-gold';
            if (rank.includes('黄金') || rank.includes('Gold')) return 'gold-platinum';
            if (rank.includes('铂金') || rank.includes('Platinum')) return 'platinum-diamond';
            if (rank.includes('钻石') || rank.includes('Diamond')) return 'diamond-star';
            if (rank.includes('星耀') || rank.includes('Star')) return 'star-king';
            if (rank.includes('王者') || rank.includes('King')) return 'king+';
            return 'all';
        }

        function getVipNumber(vipText) {
            const match = vipText.match(/V(\d+)/i);
            if (match) return parseInt(match[1]);
            return 0;
        }

        function matchVipRange(vipText, range) {
            if (range === 'all') return true;
            const vipNum = getVipNumber(vipText);
            switch(range) {
                case 'v0-v1': return vipNum >= 0 && vipNum < 1;
                case 'v1-v2': return vipNum >= 1 && vipNum < 2;
                case 'v2-v3': return vipNum >= 2 && vipNum < 3;
                case 'v3-v4': return vipNum >= 3 && vipNum < 4;
                case 'v4-v5': return vipNum >= 4 && vipNum < 5;
                case 'v5-v6': return vipNum >= 5 && vipNum < 6;
                case 'v6-v7': return vipNum >= 6 && vipNum < 7;
                case 'v7-v8': return vipNum >= 7 && vipNum < 8;
                case 'v8-v10': return vipNum >= 8 && vipNum <= 10;

            }

        function filterResults(results) {
            if (!results.length) return [];

                return results.filter(r => {

            } else if (currentGame === 'wwqy') {

                        if (filters.status === 'other_fail' && (r.success || r.auth_failed)) return false;
                    }
                    if (filters.rank && filters.rank !== 'all' && r.rank !== filters.rank) return false;
                    if (filters.level && filters.level !== 'all') {
                        const levelRange = getLevelRange(r.level);
                        if (levelRange !== filters.level) return false;
                    }
                    if (filters.account && filters.account !== 'all') {

                    }
                    if (filters.mute && filters.mute !== 'all') {

            } else if (currentGame === 'aqtw') {

                    if (filters.b_ninja && filters.b_ninja !== 'all' && !matchRange(r.b_count, filters.b_ninja)) return false;
                    if (filters.c_ninja && filters.c_ninja !== 'all' && !matchRange(r.c_count, filters.c_ninja)) return false;
                    if (filters.total_ninja && filters.total_ninja !== 'all' && !matchRange(r.total_count, filters.total_ninja)) return false;
                    if (filters.online && filters.online !== 'all' && r.online_status !== filters.online) return false;
                    return true;
                });
            } else if (currentGame === 'hpjy') {
                return results.filter(r => {
                    if (filters.status && filters.status !== 'all') {
                        if (filters.status === 'success' && !r.success) return false;
                        if (filters.status === 'auth_fail' && !r.auth_failed) return false;
                        if (filters.status === 'other_fail' && (r.success || r.auth_failed)) return false;
                    }
                    if (filters.level && filters.level !== 'all' && !matchLevelRangeHpjy(r.level, filters.level)) return false;
                    if (filters.rank && filters.rank !== 'all' && !matchRank(r.rank, filters.rank)) return false;
                    if (filters.online && filters.online !== 'all' && r.online_status !== filters.online) return false;
                    return true;
                });
            } else if (currentGame === 'sjz') {
                return results.filter(r => {
                    if (filters.status && filters.status !== 'all') {

                    if (filters.level && filters.level !== 'all' && !matchRange(r.level, filters.level)) return false;
                    if (filters.ban && filters.ban !== 'all' && r.ban_status !== filters.ban) return false;
                    if (filters.freeze && filters.freeze !== 'all' && r.freeze_status !== filters.freeze) return false;
                    if (filters.online && filters.online !== 'all' && r.online_status !== filters.online) return false;
                    if (filters.total_value && filters.total_value !== 'all' && !matchSjzTotalValueRange(r.total_value, filters.total_value)) return false;
                    return true;

                    if (filters.vip && filters.vip !== 'all' && !matchVipRange(r.vip_level, filters.vip)) return false;
                    if (filters.mute && filters.mute !== 'all') {

                        if (filters.mute === 'muted' && !r.mute_status.includes('禁言')) return false;
                    }
                    if (filters.credit && filters.credit !== 'all') {
                        if (filters.credit === 'level10' && r.credit_level !== 10) return false;
                        if (filters.credit === 'below10' && r.credit_level >= 10) return false;

                        if (filters.account === 'banned' && r.account_status !== '封禁') return false;

                    return true;

                    html += `<div class="result-card" data-copytext="${escapeHtml(copyText)}">
                                <div class="flex-between" style="margin-bottom:12px;">
                                    <span class="status-badge ${statusClass}">${statusText}</span>
                                    <span class="token-preview">🔑 ${escapeHtml(tokenLine ? tokenLine.substring(0, 60) : '')}</span>
                                </div>
                                <div class="sjz-stats">
                                    <span>📊 等级: ${item.level}</span>
                                    <span>🚫 封号: ${item.ban_status}</span>
                                    <span>❄️ 冻结: ${item.freeze_status}</span>
                                    <span>🟢 在线: ${item.online_status}</span>
                                    <span>💰 总价值: ${escapeHtml(totalValueDisp)}</span>
                                </div>
                                <div class="response-preview">${escapeHtml((item.data || item.error || '').substring(0, 200))}</div>
                                <div style="font-size:12px; color:#94a3b8; margin-top:12px; text-align:center;">✨ 点击卡片复制完整信息</div>
                             </div>`;
                } else if (currentGame === 'wzry' && item.success === true) {
                    html += `<div class="result-card" data-copytext="${escapeHtml(copyText)}">
                                <div class="flex-between" style="margin-bottom:12px;">
                                    <span class="status-badge ${statusClass}">${statusText}</span>
                                    <span class="token-preview">🔑 ${escapeHtml(tokenLine ? tokenLine.substring(0, 60) : '')}</span>
                                </div>
                                <div class="wzry-stats">
                                    <span>🎨 皮肤: ${item.skin_count}</span>
                                    <span>🏆 段位: ${item.rank}</span>
                                    <span>👑 贵族: ${item.vip_level}</span>
                                    <span>🔇 禁言: ${item.mute_status}</span>
                                    <span>⭐ 信誉: ${item.credit_level}</span>
                                    <span>📛 账号: ${item.account_status}</span>
                                </div>
                                <div class="response-preview">${escapeHtml((item.data || item.error || '').substring(0, 200))}</div>
                                <div style="font-size:12px; color:#94a3b8; margin-top:12px; text-align:center;">✨ 点击卡片复制完整信息</div>
                             </div>`;
                } else {
                    let preview = '';
                    if (item.success === true) {
                        preview = (item.data || '').substring(0, 200);
                        if (preview.length === 200) preview += '…';
                    } else {
                        preview = `错误: ${item.error || '未知'}`;
                    }
                    html += `<div class="result-card" data-copytext="${escapeHtml(copyText)}">
                                <div class="flex-between" style="margin-bottom:12px;">
                                    <span class="status-badge ${statusClass}">${statusText}</span>
                                    <span class="token-preview">🔑 ${escapeHtml(tokenLine ? tokenLine.substring(0, 60) : '')}</span>
                                </div>
                                <div class="response-preview">${escapeHtml(preview).replace(/\n/g, '<br>')}</div>
                                <div style="font-size:12px; color:#94a3b8; margin-top:12px; text-align:center;">✨ 点击卡片复制完整信息</div>
                             </div>`;
                }
            }
            cardsContainer.innerHTML = html;
            document.querySelectorAll('.result-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const copyText = card.getAttribute('data-copytext');
                    if (copyText) {
                        const decoded = copyText.replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>');
                        copyToClipboard(decoded);
                    } else {
                        showToast('❌ 未找到复制内容', true);
                    }
                });
            });
        }

        function exportWithCurrentFilter() {
            const filtered = filterResults(currentResults);
            if (filtered.length === 0) {
                showToast('当前筛选条件下没有记录可导出', true);
                return;
            }
            let txtContent = filtered.map(item => item.formatted).join('\n');
            const blob = new Blob([txtContent], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `export_${currentGame}_${new Date().toISOString().slice(0,19)}.txt`;
            link.click();
            URL.revokeObjectURL(link.href);
            showToast(`已导出 ${filtered.length} 条记录`);
        }

        async function sendQuery(textContent) {
            resultsSection.style.display = 'block';
            cardsContainer.innerHTML = '<div class="loading">⏳ 正在批量查询，请稍候...</div>';
            exportBtn.disabled = true;
            const formData = new FormData();
            formData.append('text_input', textContent);
            formData.append('game_type', currentGame);
            if (currentGame === 'aqtw' || currentGame === 'hpjy' || currentGame === 'wzry') {
                formData.append('platform', platformSelect.value);
            }
            try {
                const response = await fetch(API_URL, { method: 'POST', body: formData });
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                if (!Array.isArray(data)) throw new Error('返回数据格式异常');
                currentResults = data;
                const config = filtersConfig[currentGame];
                currentFilters = {};
                for (const filter of config) {
                    currentFilters[filter.id] = 'all';
                }
                renderFilterBar();
                renderFilteredCards();
                exportBtn.disabled = false;
                showToast(`查询完成，共 ${data.length} 条记录`);
            } catch (err) {
                cardsContainer.innerHTML = `<div class="loading" style="color:#b91c1c;">❌ ${escapeHtml(err.message)}</div>`;
                showToast(err.message, true);
                exportBtn.disabled = true;
            }
        }

        function switchGame(game) {
            currentGame = game;
            if (game === 'tx') {
                gameTitle.innerText = '腾讯全游戏验号器';
                gameSub.innerText = '自动提取 access_token&openid&pay_token，支持在线/禁玩筛选';
                platformSelector.style.display = 'none';
            } else if (game === 'wwqy') {
                gameTitle.innerText = '无畏契约验号器';
                gameSub.innerText = '自动提取 access_token&openid&pay_token，支持段位/等级/封号/禁言筛选';
                platformSelector.style.display = 'none';
            } else if (game === 'aqtw') {
                gameTitle.innerText = '暗区突围验号器';
                gameSub.innerText = '自动提取任意格式Token，支持科恩币/仓库/等级/封号/在线筛选';
                platformSelector.style.display = 'flex';
            } else if (game === 'ninja') {
                gameTitle.innerText = '火影忍者验号器';
                gameSub.innerText = '自动提取任意格式Token，支持S/A/B/C忍者、总数、在线筛选';
                platformSelector.style.display = 'none';
            } else if (game === 'hpjy') {
                gameTitle.innerText = '和平精英验号器';
                gameSub.innerText = '自动提取任意格式Token，支持等级/段位/在线筛选';
                platformSelector.style.display = 'flex';
            } else if (game === 'sjz') {
                gameTitle.innerText = '三角洲验号器';
                gameSub.innerText = '自动提取任意格式Token，支持等级/封号/冻结/在线/总价值筛选';
                platformSelector.style.display = 'none';
            } else {
                gameTitle.innerText = '王者荣耀验号器';
                gameSub.innerText = '自动提取任意格式Token，支持皮肤/段位/贵族/禁言/信誉/账号状态筛选';
                platformSelector.style.display = 'flex';
            }
            currentResults = [];
            resultsSection.style.display = 'none';
            cardsContainer.innerHTML = '';
            const config = filtersConfig[currentGame];
            currentFilters = {};
            for (const filter of config) {
                currentFilters[filter.id] = 'all';
            }
            renderFilterBar();
        }

        queryBtn.addEventListener('click', () => {
            let text = textarea.value.trim();
            if (!text) { showToast('请填写账号信息或上传文件', true); return; }
            sendQuery(text);
        });

        clearBtn.addEventListener('click', () => {
            textarea.value = '';
            showToast('已清空输入框');
        });

        function readFileAndFill(file) {
            if (!file || !file.name.endsWith('.txt')) { showToast('请上传 .txt 文件', true); return; }
            const reader = new FileReader();
            reader.onload = e => { textarea.value = e.target.result; showToast(`已加载文件：${file.name}`); };
            reader.onerror = () => showToast('文件读取失败', true);
            reader.readAsText(file, 'UTF-8');
        }

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.borderColor = '#3b82f6'; uploadArea.style.background = '#eff6ff'; });
        uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = '#cbd5e1'; uploadArea.style.background = '#f8fafc'; });
        uploadArea.addEventListener('drop', e => {
            e.preventDefault();
            uploadArea.style.borderColor = '#cbd5e1';
            uploadArea.style.background = '#f8fafc';
            if (e.dataTransfer.files.length) readFileAndFill(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', () => { if (fileInput.files.length) readFileAndFill(fileInput.files[0]); });

        exportBtn.addEventListener('click', exportWithCurrentFilter);

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const game = tab.getAttribute('data-game');
                if (game === currentGame) return;
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                switchGame(game);
            });
        });

        switchGame('tx');
        renderFilterBar();
    })();
</script>
</body>
</html>
